# =============================================================================
# beeport.xyz — nginx reference (CORS-aware for MetaMask Snaps + Bee API)
# =============================================================================
# Include this file from nginx.conf inside `http { }` (map blocks MUST live in
# http context, not inside server{}).
#
# Rationale (see backend/README.md § CORS):
#   - Snaps use fetch() with Origin: null → we echo "null" back; we cannot use
#     Access-Control-Allow-Origin: * together with Allow-Credentials: true.
#   - Preflight OPTIONS must repeat the same Allow-* headers as real methods.
#   - Allow-Headers is a superset for /bzz, /stamps, /wallet, /tags (Bee + proxy).
# =============================================================================

map $http_origin $cors_origin {
    default "";
    "null" "null";
    "~^https://beeport\.xyz$" "https://beeport.xyz";
    "~^https://www\.beeport\.xyz$" "https://www.beeport.xyz";
    "~^https://buzz-mint\.eth\.limo$" "https://buzz-mint.eth.limo";
    "~^http://localhost:3000$" "http://localhost:3000";
    "~^https://localhost:3000$" "https://localhost:3000";
    "~^http://127\.0\.0\.1:3000$" "http://127.0.0.1:3000";
    "~^https://127\.0\.0\.1:3000$" "https://127.0.0.1:3000";
}

map $request_method $cors_allow_headers_api {
    default "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,swarm-postage-batch-id,swarm-pin,swarm-deferred-upload,registry-address,swarm-collection,x-upload-signed-message,x-uploader-address,x-file-name,x-message-content,x-upload-session-token,x-multi-file-upload,swarm-redundancy-level,Swarm-Index-Document,Swarm-Error-Document,swarm-tag";
    OPTIONS "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,swarm-postage-batch-id,swarm-pin,swarm-deferred-upload,registry-address,swarm-collection,x-upload-signed-message,x-uploader-address,x-file-name,x-message-content,x-upload-session-token,x-multi-file-upload,swarm-redundancy-level,Swarm-Index-Document,Swarm-Error-Document,swarm-tag";
}

map $request_method $cors_allow_methods_api {
    default "GET, POST, OPTIONS, PUT, DELETE";
    OPTIONS "GET, POST, OPTIONS, PUT, DELETE";
}

map $request_method $cors_expose_headers_api {
    default "Content-Length,Content-Range,x-session-token,x-session-created,x-session-valid";
    OPTIONS "Content-Length,Content-Range,x-session-token,x-session-created,x-session-valid";
}

map $request_method $cors_allow_headers_health {
    default "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
    OPTIONS "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
}

map $request_method $cors_allow_methods_health {
    default "GET, OPTIONS";
    OPTIONS "GET, OPTIONS";
}

server {
    listen 80;
    server_name beeport.xyz www.beeport.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name beeport.xyz www.beeport.xyz;

    ssl_certificate /etc/letsencrypt/live/beeport.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beeport.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/beeport/out/;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /bzz {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' $cors_allow_methods_api always;
        add_header 'Access-Control-Allow-Headers' $cors_allow_headers_api always;
        add_header 'Access-Control-Expose-Headers' $cors_expose_headers_api always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' $cors_allow_methods_api always;
            add_header 'Access-Control-Allow-Headers' $cors_allow_headers_api always;
            add_header 'Access-Control-Expose-Headers' $cors_expose_headers_api always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
        proxy_pass http://localhost:3333;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 0;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /stamps {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' $cors_allow_methods_api always;
        add_header 'Access-Control-Allow-Headers' $cors_allow_headers_api always;
        add_header 'Access-Control-Expose-Headers' $cors_expose_headers_api always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' $cors_allow_methods_api always;
            add_header 'Access-Control-Allow-Headers' $cors_allow_headers_api always;
            add_header 'Access-Control-Expose-Headers' $cors_expose_headers_api always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
        proxy_pass http://localhost:1633;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 0;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /wallet {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' $cors_allow_methods_api always;
        add_header 'Access-Control-Allow-Headers' $cors_allow_headers_api always;
        add_header 'Access-Control-Expose-Headers' $cors_expose_headers_api always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' $cors_allow_methods_api always;
            add_header 'Access-Control-Allow-Headers' $cors_allow_headers_api always;
            add_header 'Access-Control-Expose-Headers' $cors_expose_headers_api always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
        proxy_pass http://localhost:1633;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 0;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /tags {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' $cors_allow_methods_api always;
        add_header 'Access-Control-Allow-Headers' $cors_allow_headers_api always;
        add_header 'Access-Control-Expose-Headers' $cors_expose_headers_api always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' $cors_allow_methods_api always;
            add_header 'Access-Control-Allow-Headers' $cors_allow_headers_api always;
            add_header 'Access-Control-Expose-Headers' $cors_expose_headers_api always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
        proxy_pass http://localhost:1633;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 0;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /health {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' $cors_allow_methods_health always;
        add_header 'Access-Control-Allow-Headers' $cors_allow_headers_health always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' $cors_allow_methods_health always;
            add_header 'Access-Control-Allow-Headers' $cors_allow_headers_health always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
        proxy_pass http://localhost:1633;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
